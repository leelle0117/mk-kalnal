<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>귀멸의 칼날 - 나에게 어울리는 캐릭터는?</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0f;
      --bg-card: #141420;
      --crimson: #e7305b;
      --crimson-dark: #b8243f;
      --tanjiro-green: #2d6a4f;
      --wisteria: #7b68ee;
      --wisteria-light: #9370db;
      --gold: #d4a853;
      --text-primary: #f5f0e8;
      --text-secondary: #a8a0b8;
      --text-dim: #6b6580;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== WISTERIA PETALS ANIMATION ===== */
    .petals-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .petal {
      position: absolute;
      top: -20px;
      width: 12px;
      height: 16px;
      background: radial-gradient(ellipse at center, rgba(147, 112, 219, 0.8), rgba(123, 104, 238, 0.3));
      border-radius: 50% 50% 50% 0;
      animation: fall linear infinite;
      opacity: 0;
    }

    @keyframes fall {
      0% { opacity: 0; transform: translateY(-20px) rotate(0deg) translateX(0); }
      10% { opacity: 0.7; }
      90% { opacity: 0.5; }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg) translateX(100px); }
    }

    /* ===== ICHIMATSU (CHECKERED) PATTERN ===== */
    .ichimatsu-border {
      background: repeating-conic-gradient(var(--tanjiro-green) 0% 25%, #1a1a2e 0% 50%) 0 0 / 16px 16px;
      padding: 3px;
    }

    /* ===== APP CONTAINER ===== */
    #app {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ===== SCREENS ===== */
    .screen {
      display: none;
      width: 100%;
      animation: fadeIn 0.5s ease-out;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(60px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideOut {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(-60px); }
    }

    /* ===== START SCREEN ===== */
    #startScreen {
      position: relative;
      animation: fadeInOnly 0.5s ease-out;
    }

    @keyframes fadeInOnly {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    #startScreen::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        linear-gradient(to bottom,
          rgba(10,10,15,0.6) 0%,
          rgba(10,10,15,0.5) 30%,
          rgba(10,10,15,0.55) 50%,
          rgba(10,10,15,0.8) 75%,
          rgba(10,10,15,0.95) 100%),
        linear-gradient(to right,
          rgba(10,10,15,0.5) 0%,
          rgba(10,10,15,0.2) 20%,
          rgba(10,10,15,0.2) 80%,
          rgba(10,10,15,0.5) 100%),
        url('images/poster.jpg') center 40% / 100% auto no-repeat,
        linear-gradient(to bottom, #12101a 0%, #0a0a0f 100%);
      z-index: -1;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      #startScreen::before {
        background:
          linear-gradient(to bottom,
            rgba(10,10,15,0.55) 0%,
            rgba(10,10,15,0.45) 20%,
            rgba(10,10,15,0.5) 40%,
            rgba(10,10,15,0.8) 70%,
            rgba(10,10,15,0.95) 100%),
          url('images/poster.jpg') center 30% / auto 85vh no-repeat,
          linear-gradient(to bottom, #12101a 0%, #0a0a0f 100%);
      }
    }

    .start-screen {
      text-align: center;
    }

    .logo-area {
      margin-bottom: 30px;
    }

    .katana-icon {
      font-size: 52px;
      margin-bottom: 16px;
      display: block;
      filter: drop-shadow(0 0 12px rgba(255,255,255,0.4));
    }

    .title-main {
      font-family: 'Noto Serif KR', serif;
      font-size: 32px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1.3;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(231, 48, 91, 0.5), 0 2px 8px rgba(0,0,0,0.8);
    }

    .title-main .highlight {
      color: var(--crimson);
      display: block;
      font-size: 38px;
      text-shadow: 0 0 20px rgba(231, 48, 91, 0.6), 0 2px 8px rgba(0,0,0,0.8);
    }

    .title-sub {
      font-size: 15px;
      color: #d0c8e0;
      margin-bottom: 12px;
      font-weight: 300;
      letter-spacing: 1px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    }

    .title-desc {
      font-size: 13px;
      color: #9a92aa;
      line-height: 1.8;
      margin-bottom: 40px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    .start-decoration {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--wisteria), transparent);
      margin: 0 auto 30px;
    }

    .start-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 48px;
      font-family: 'Noto Serif KR', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      background: linear-gradient(135deg, var(--crimson), var(--crimson-dark));
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 25px rgba(231, 48, 91, 0.5), 0 0 40px rgba(231, 48, 91, 0.2);
      position: relative;
      overflow: hidden;
    }

    .start-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }

    .start-btn:hover::before {
      left: 100%;
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 35px rgba(231, 48, 91, 0.5);
    }

    .start-btn:active {
      transform: translateY(0);
    }

    .info-badges {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      color: #a8a0b8;
      border: 1px solid rgba(107, 101, 128, 0.4);
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(10, 10, 15, 0.5);
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }

/* ===== QUIZ SCREEN ===== */
    .quiz-screen {
      width: 100%;
    }

    .progress-section {
      width: 100%;
      margin-bottom: 32px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-text {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .progress-count {
      font-family: 'Noto Serif KR', serif;
      font-size: 14px;
      color: var(--gold);
      font-weight: 700;
    }

    .progress-bar-outer {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--crimson), var(--wisteria));
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .question-card {
      width: 100%;
      animation: slideIn 0.4s ease-out;
    }

    .question-card.leaving {
      animation: slideOut 0.3s ease-in forwards;
    }

    .question-number {
      font-family: 'Noto Serif KR', serif;
      font-size: 13px;
      color: var(--wisteria-light);
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .question-text {
      font-family: 'Noto Serif KR', serif;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text-primary);
      margin-bottom: 28px;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 18px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
      -webkit-tap-highlight-color: transparent;
      text-align: left;
      line-height: 1.5;
    }

    @media (hover: hover) {
      .option-btn:hover {
        background: rgba(123, 104, 238, 0.1);
        border-color: rgba(123, 104, 238, 0.3);
        transform: translateX(4px);
      }
    }

    .option-btn:active {
      transform: translateX(2px) scale(0.99);
    }

    .option-btn.selected {
      background: rgba(231, 48, 91, 0.15);
      border-color: var(--crimson);
      transform: translateX(4px);
    }

    .option-marker {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      transition: border-color 0.25s ease, background 0.25s ease, color 0.25s ease;
    }

    @media (hover: hover) {
      .option-btn:hover .option-marker {
        border-color: var(--wisteria);
        color: var(--wisteria);
      }
    }

    .option-btn.selected .option-marker {
      border-color: var(--crimson);
      background: var(--crimson);
      color: white;
    }

    /* ===== LOADING SCREEN ===== */
    .loading-screen {
      text-align: center;
    }

    .loading-breath {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--crimson), transparent);
      animation: breathe 2s ease-in-out infinite;
      margin: 0 auto 30px;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(0.8); opacity: 0.4; box-shadow: 0 0 20px rgba(231, 48, 91, 0.3); }
      50% { transform: scale(1.2); opacity: 0.9; box-shadow: 0 0 60px rgba(231, 48, 91, 0.6); }
    }

    .loading-text {
      font-family: 'Noto Serif KR', serif;
      font-size: 18px;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .loading-sub {
      font-size: 13px;
      color: var(--text-dim);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* ===== RESULT SCREEN ===== */
    .result-screen {
      width: 100%;
    }

    .result-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .result-label {
      font-size: 13px;
      color: var(--wisteria-light);
      letter-spacing: 2px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .result-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 16px;
      color: var(--text-secondary);
    }

    .result-card {
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 24px;
      animation: fadeIn 0.8s ease-out;
    }

    .result-card-top {
      padding: 40px 28px 28px;
      text-align: center;
      position: relative;
    }

    .result-card-top::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      opacity: 0.1;
      background: repeating-conic-gradient(currentColor 0% 25%, transparent 0% 50%) 0 0 / 20px 20px;
    }

    .character-symbol {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    }

    .character-image {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 3px solid rgba(255,255,255,0.25);
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      background: rgba(0,0,0,0.2);
    }

    .character-name-kr {
      font-family: 'Noto Serif KR', serif;
      font-size: 32px;
      font-weight: 900;
      color: white;
      position: relative;
      z-index: 1;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .character-name-jp {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
      position: relative;
      z-index: 1;
    }

    .character-title {
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      margin-top: 10px;
      padding: 4px 14px;
      background: rgba(0,0,0,0.25);
      border-radius: 20px;
      display: inline-block;
      position: relative;
      z-index: 1;
    }

    .result-card-bottom {
      background: var(--bg-card);
      padding: 28px;
    }

    .result-description {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .result-traits {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .trait-tag {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 500;
    }

    .result-breathing {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .breathing-icon {
      font-size: 24px;
    }

    .breathing-info {
      display: flex;
      flex-direction: column;
    }

    .breathing-label {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 500;
    }

    .breathing-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
    }

    /* ===== MATCH PERCENTAGE ===== */
    .match-section {
      width: 100%;
      background: var(--bg-card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .match-title {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 16px;
      font-weight: 500;
    }

    .match-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .match-item:last-child {
      margin-bottom: 0;
    }

    .match-name {
      font-size: 13px;
      color: var(--text-secondary);
      min-width: 110px;
      flex-shrink: 0;
    }

    .match-bar-outer {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden;
    }

    .match-bar-inner {
      height: 100%;
      border-radius: 3px;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .match-percent {
      font-size: 12px;
      color: var(--text-dim);
      min-width: 36px;
      text-align: right;
      font-weight: 700;
    }

    /* ===== SHARE CAPTURE AREA ===== */
    .capture-area {
      width: 100%;
      background: var(--bg-dark);
      padding: 20px;
      border-radius: 20px;
    }

    .share-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(20, 20, 32, 0.95);
      color: var(--text-primary);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid rgba(123, 104, 238, 0.3);
      z-index: 100;
      transition: transform 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .share-toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .btn-primary.sharing {
      pointer-events: none;
      opacity: 0.7;
    }

    /* ===== BUTTONS ===== */
    .action-buttons {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .btn-secondary {
      flex: 1;
      padding: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .btn-primary {
      flex: 1;
      padding: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--crimson), var(--crimson-dark));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(231, 48, 91, 0.4);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
      .title-main { font-size: 26px; }
      .title-main .highlight { font-size: 32px; }
      .question-text { font-size: 18px; }
      .option-btn { padding: 14px 14px; font-size: 13px; }
      .character-name-kr { font-size: 26px; }
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(123, 104, 238, 0.3); border-radius: 2px; }
  </style>
</head>
<body>
  <!-- Wisteria Petals -->
  <div class="petals-container" id="petals"></div>

  <div id="app">
    <!-- ===== START SCREEN ===== -->
    <div class="screen active" id="startScreen">
      <div class="start-screen">
        <div class="logo-area">
          <span class="katana-icon">&#9876;&#65039;</span>
          <div class="title-sub" style="margin-bottom:8px;">전집중 호흡!</div>
          <div class="title-sub">&#x2500;&#x2500; &#xD574;&#xC758; &#xD638;&#xD761;&#xC744; &#xCC3E;&#xC544;&#xC11C; &#x2500;&#x2500;</div>
          <h1 class="title-main">
            &#xB098;&#xC5D0;&#xAC8C; &#xC5B4;&#xC6B8;&#xB9AC;&#xB294;
            <span class="highlight">&#xADC0;&#xBA78;&#xC758; &#xCE7C;&#xB0A0;</span>
            &#xCE90;&#xB9AD;&#xD130;&#xB294;?
          </h1>
        </div>
        <div class="start-decoration"></div>
        <p class="title-desc">
          15&#xAC00;&#xC9C0; &#xC9C8;&#xBB38;&#xC744; &#xD1B5;&#xD574; &#xB2F9;&#xC2E0;&#xC758; &#xC131;&#xACA9;&#xACFC; &#xAC00;&#xC7A5; &#xC798; &#xB9DE;&#xB294;<br>
          &#xADC0;&#xBA78;&#xC758; &#xCE7C;&#xB0A0; &#xB4F1;&#xC7A5;&#xC778;&#xBB3C;&#xC744; &#xCC3E;&#xC544;&#xBCF4;&#xC138;&#xC694;!
        </p>
        <button class="start-btn" onclick="startQuiz()">
          &#xC2DC;&#xC791;&#xD558;&#xAE30;
        </button>
        <div class="info-badges">
          <span class="badge">&#xD14C;&#xC2A4;&#xD2B8; 15&#xBB38;&#xD56D;</span>
          <span class="badge">&#xC18C;&#xC694;&#xC2DC;&#xAC04; 1&#xBD84;</span>
          <span class="badge">14&#xBA85;&#xC758; &#xCE90;&#xB9AD;&#xD130;</span>
        </div>
      </div>
    </div>

    <!-- ===== QUIZ SCREEN ===== -->
    <div class="screen" id="quizScreen">
      <div class="quiz-screen">
        <div class="progress-section">
          <div class="progress-info">
            <span class="progress-text" id="progressText">&#xC9C8;&#xBB38;</span>
            <span class="progress-count" id="progressCount">1 / 15</span>
          </div>
          <div class="progress-bar-outer">
            <div class="progress-bar-inner" id="progressBar" style="width: 0%"></div>
          </div>
        </div>
        <div id="questionContainer"></div>
      </div>
    </div>

    <!-- ===== LOADING SCREEN ===== -->
    <div class="screen" id="loadingScreen">
      <div class="loading-screen">

          { text: "겁쟁이처럼 보이지만 누구보다 용감한 마음", scores: {zenitsu:3, kanao:3} },
          { text: "거칠어 보이지만 사실은 정이 넘치는 사람", scores: {inosuke:3, sanemi:3} },
          { text: "차분해 보이지만 속은 누구보다 뜨겁게 타오른다", scores: {giyu:3, muichiro:2, gyomei:2} },
          { text: "평범해 보이지만 남모르는 야망과 꿈이 있다", scores: {tengen:2, muzan:2, mitsuri:2, rengoku:1, nezuko:1} }
        ]
      }

    // ===== APP STATE =====
    let currentQuestion = 0;
    let scores = {};
    let isTransitioning = false;

    // ===== INITIALIZE =====
    function init() {
      createPetals();
      Object.keys(characters).forEach(key => { scores[key] = 0; });
    }

    // ===== PETAL ANIMATION =====
    function createPetals() {
      const container = document.getElementById('petals');
      for (let i = 0; i < 20; i++) {
        const petal = document.createElement('div');
        petal.className = 'petal';
        petal.style.left = Math.random() * 100 + '%';
        petal.style.animationDuration = (6 + Math.random() * 8) + 's';
        petal.style.animationDelay = (Math.random() * 10) + 's';
        petal.style.width = (8 + Math.random() * 8) + 'px';
        petal.style.height = (10 + Math.random() * 10) + 'px';
        petal.style.opacity = 0.3 + Math.random() * 0.4;
        container.appendChild(petal);
      }
    }

    // ===== SCREEN MANAGEMENT =====
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    // ===== START QUIZ =====
    function startQuiz() {
      currentQuestion = 0;
      Object.keys(characters).forEach(key => { scores[key] = 0; });
      showScreen('quizScreen');
      renderQuestion();
    }

    // ===== RENDER QUESTION =====
    function renderQuestion() {
      const q = questions[currentQuestion];
      const container = document.getElementById('questionContainer');
      const progress = ((currentQuestion) / questions.length) * 100;

      document.getElementById('progressBar').style.width = progress + '%';
      document.getElementById('progressCount').textContent = `${currentQuestion + 1} / ${questions.length}`;

      const markers = ['A', 'B', 'C', 'D', 'E'];

      container.innerHTML = `
        <div class="question-card" id="questionCard">
          <div class="question-number">QUESTION ${currentQuestion + 1}</div>
          <h2 class="question-text">${q.question}</h2>
          <div class="options-list">
            ${q.options.map((opt, i) => `
              <button class="option-btn" onclick="selectOption(${i})" id="opt${i}">
                <span class="option-marker">${markers[i]}</span>
                <span>${opt.text}</span>
              </button>
            `).join('')}
          </div>
        </div>
      `;
    }

    // ===== SELECT OPTION =====
    function selectOption(index) {
      if (isTransitioning) return;
      isTransitioning = true;

      const option = questions[currentQuestion].options[index];
      const btn = document.getElementById('opt' + index);
      btn.classList.add('selected');

      // Add scores
      Object.entries(option.scores).forEach(([char, score]) => {
        scores[char] = (scores[char] || 0) + score;
      });

      setTimeout(() => {
        const card = document.getElementById('questionCard');
        card.classList.add('leaving');

        setTimeout(() => {
          currentQuestion++;
          if (currentQuestion < questions.length) {
            renderQuestion();
          } else {
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progressCount').textContent = `15 / 15`;
            showLoading();
          }
          isTransitioning = false;
        }, 300);
      }, 400);
    }

    // ===== LOADING =====
    function showLoading() {
      showScreen('loadingScreen');
      setTimeout(() => { showResult(); }, 2500);
    }

    // ===== CALCULATE RESULT =====
    function getResult() {
      let maxScore = 0;
      let resultChar = 'tanjiro';

      Object.entries(scores).forEach(([char, score]) => {
        if (score > maxScore) {
          maxScore = score;
          resultChar = char;
        }
      });

      // Get top 5 for chart
      const sorted = Object.entries(scores)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);

      const topScore = sorted[0][1];

      return {
        character: characters[resultChar],
        charKey: resultChar,
        topMatches: sorted.map(([key, score]) => ({
          name: characters[key].name,
          percent: Math.round((score / topScore) * 100),
          color: characters[key].barColor
        }))
      };
    }

    // ===== SHOW RESULT =====
    function showResult() {
      const result = getResult();
      const char = result.character;

      const resultHTML = `
        <div class="capture-area" id="captureArea">
          <div class="result-header">
            <div class="result-label">YOUR CHARACTER</div>
            <div class="result-title">당신에게 어울리는 귀멸의 칼날 캐릭터</div>
          </div>

          <div class="result-card">
            <div class="result-card-top" style="background: linear-gradient(135deg, ${char.color1}, ${char.color2}); color: ${char.color1};">
              <img class="character-image" src="${char.image}" alt="${char.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
              <span class="character-symbol" style="display:none;">${char.symbol}</span>
              <div class="character-name-kr">${char.name}</div>
              <div class="character-name-jp">${char.nameJp}</div>
              <div class="character-title">${char.title}</div>
            </div>
            <div class="result-card-bottom">
              <p class="result-description">${char.description}</p>
              <div class="result-traits">
                ${char.traits.map(t => `<span class="trait-tag" style="background:${char.tagBg}; color:${char.tagColor};">#${t}</span>`).join('')}
              </div>
              <div class="result-breathing">
                <span class="breathing-icon">${char.breathing.icon}</span>
                <div class="breathing-info">
                  <span class="breathing-label">사용 호흡법</span>
                  <span class="breathing-name">${char.breathing.name}</span>
                </div>
              </div>
            </div>
          </div>

          <div class="match-section">
            <div class="match-title">캐릭터 유사도 TOP 5</div>
            ${result.topMatches.map(m => `
              <div class="match-item">
                <span class="match-name">${m.name}</span>
                <div class="match-bar-outer">
                  <div class="match-bar-inner" style="width: 0%; background: ${m.color};" data-width="${m.percent}%"></div>
                </div>
                <span class="match-percent">${m.percent}%</span>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn-secondary" onclick="goHome()">다시 하기</button>
          <button class="btn-primary" id="shareBtn" onclick="shareResult('${result.charKey}')">결과 공유하기</button>
        </div>
        <div class="share-toast" id="shareToast">이미지가 저장되었습니다!</div>
      `;

      document.getElementById('resultContent').innerHTML = resultHTML;
      showScreen('resultScreen');

      // Animate match bars
      setTimeout(() => {
        document.querySelectorAll('.match-bar-inner').forEach(bar => {
          bar.style.width = bar.dataset.width;
        });
      }, 300);
    }

    // ===== GO HOME =====
    function goHome() {
      currentQuestion = 0;
      isTransitioning = false;
      Object.keys(characters).forEach(key => { scores[key] = 0; });
      document.getElementById('questionContainer').innerHTML = '';
      showScreen('startScreen');
    }

    // ===== SHARE =====
    function showToast(message) {
      const toast = document.getElementById('shareToast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); }, 2500);
    }

    async function shareResult(charKey) {
      const char = characters[charKey];
      const shareText = `${char.symbol} 귀멸의 칼날 캐릭터 테스트 결과\n\n나에게 어울리는 캐릭터는...\n${char.symbol} ${char.name} (${char.nameJp}) ${char.symbol}\n\n"${char.title}"\n${char.breathing.icon} ${char.breathing.name}\n${char.traits.map(t => '#' + t).join(' ')}\n\n🔗 나도 해보기!\nhttps://mk-kalnal.vercel.app`;

      // Try Web Share API (mobile)
      if (navigator.share) {
        try {
          await navigator.share({
            title: '귀멸의 칼날 캐릭터 테스트',
            text: shareText
          });
          return;
        } catch (e) {
          if (e.name === 'AbortError') return;
        }
      }

      // Fallback: copy to clipboard
      try {
        await navigator.clipboard.writeText(shareText);
        showToast('결과가 클립보드에 복사되었습니다!');
      } catch (e) {
        // Final fallback: textarea copy
        const ta = document.createElement('textarea');
        ta.value = shareText;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('결과가 클립보드에 복사되었습니다!');
      }
    }

// ===== INIT =====
    // iOS Safari bfcache 복원 시 상태 초기화
    window.addEventListener('pageshow', function(event) {
      if (event.persisted) {
        currentQuestion = 0;
        isTransitioning = false;
        Object.keys(characters).forEach(key => { scores[key] = 0; });
        document.getElementById('questionContainer').innerHTML = '';
        showScreen('startScreen');
      }
    });

    init();
  </script>
